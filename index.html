// 解析 CSV
const rows = rawData.trim().split('\n').slice(1).map(line => {
  const parts = line.split(',');
  return {
    road: parts[0],
    lon: parseFloat(parts[1]),
    lat: parseFloat(parts[2]),
    stake: parts[3],
    township: parts[4],
    village: parts[5],
    district: parts[6]
  };
});

// 解析樁號為公里數
function parseStake(s) {
  const m = s.match(/(\d+)K\+(\d+)/);
  if (m) return parseInt(m[1]) + parseInt(m[2]) / 1000;
  return null;
}

// 格式化公里數為樁號
function formatStake(km) {
  const k = Math.floor(km);
  const m = Math.round((km - k) * 1000);
  return `${k}K+${String(m).padStart(3, '0')}`;
}

rows.forEach(r => {
  r.km = parseStake(r.stake);
});

let currentFilter = '台61';

function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn61').className = 'toggle-btn' + (f === '台61' ? ' active-61' : '');
  document.getElementById('btn15').className = 'toggle-btn' + (f === '台15' ? ' active-15' : '');
  doQuery();
}
function doQuery() {
  const input = document.getElementById('kmInput').value.trim();
  const resultDiv = document.getElementById('result');

  const queryKm = parseInt(input);

  if (isNaN(queryKm) || queryKm < 0) {
    resultDiv.innerHTML = '<div class="no-result">請輸入公里數，例如 10</div>';
    return;
  }

  // 篩選該 K 數的全部資料（km >= queryKm 且 km < queryKm + 1）
  let candidates = rows.filter(r => r.km !== null && r.km >= queryKm && r.km < queryKm + 1 && r.road === currentFilter);

  if (candidates.length === 0) {
    resultDiv.innerHTML = `<div class="no-result">查無 ${queryKm}K 資料，里程範圍：台61 7K~16K、台15 13K~21K</div>`;
    return;
  }

  resultDiv.innerHTML = candidates.map(r => {
    const tagClass = r.road === '台61' ? 'tag-61' : 'tag-15';
    const gmapsUrl = `https://www.google.com/maps?q=${r.lat},${r.lon}`;
    return `<div class="result-item">
      <div class="road"><span class="tag ${tagClass}">${r.road}</span> ${r.stake}</div>
      <div class="coords"><a href="${gmapsUrl}" target="_blank" style="color:#4fc3f7;text-decoration:underline;">📍 ${r.lat}, ${r.lon}</a>（點擊開啟 Google Maps）</div>
      <div class="meta">${r.township} ${r.village}（${r.district}）</div>
    </div>`;
  }).join('');
}

// Enter key
document.getElementById('kmInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doQuery();
});
